        // Text-to-Speech Funktion
        function speakGerman(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                
                // Entfernt Klammern, damit der Browser "sich kümmern um" vorliest statt "sich kümmern Klammer auf um Klammer zu"
                const cleanText = text.replace(/[()]/g, '');
                
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'de-DE';
                utterance.rate = 0.85; 
                window.speechSynthesis.speak(utterance);
            }
        }

        // Wörter rendern
        function updateWords(category) {
            const container = document.getElementById('words-container');
            const words = wordCategories[category];
            container.innerHTML = '';

            words.forEach((word) => {
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-200 rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow flex flex-col h-full";
                
                card.innerHTML = `
                    <div class="flex-grow text-center flex flex-col justify-center py-2">
                        <p class="text-lg sm:text-xl font-bold text-slate-800 leading-tight">${word.de}</p>
                        <p class="text-sm text-slate-500 mt-2 italic">${word.en}</p>
                    </div>
                    <button class="mt-3 flex items-center justify-center gap-2 w-full py-2 px-3 rounded-lg bg-slate-50 border border-slate-200 text-blue-600 text-sm font-medium hover:bg-blue-50 hover:border-blue-200 transition-all duration-200">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd"></path></svg>
                        Hören
                    </button>
                `;

                // Event-Listener sicher hinzufügen
                card.querySelector('button').addEventListener('click', () => speakGerman(word.de));
                container.appendChild(card);
            });
        }

    // Timer Logic

    const STUDY_TIME = 20 * 60; // 20 minutes in seconds
    let timeLeft = STUDY_TIME; 
    let isRunning = false;

    const playIcon = `<path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347c-.75.412-1.667-.13-1.667-.986V5.653Z" />`;
    const pauseIcon = `<path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25v13.5m-7.5-13.5v13.5" />`;

    function updateDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        document.getElementById('timer-display').innerText = 
            `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function playAlarm() {
        // Uses the browser's Web Audio API to create a beep sound natively
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime); // A5 note
        
        gainNode.gain.setValueAtTime(0.1, ctx.currentTime); // Volume control
        
        osc.connect(gainNode);
        gainNode.connect(ctx.destination);
        
        osc.start();
        osc.stop(ctx.currentTime + 1.5); // Beep duration: 1.5 seconds

        setTimeout(() => {
            alert("Die 20 Minuten sind um! Zeit für eine Pause.\n(20 minutes are up! Time for a break.)");
        }, 100);
    }

    function toggleTimer() {
        const btnIcon = document.getElementById('timer-icon');
        
        if (isRunning) {
            // Pause the timer
            clearInterval(timerInterval);
            isRunning = false;
            btnIcon.innerHTML = playIcon;
        } else {
            // Start the timer
            isRunning = true;
            btnIcon.innerHTML = pauseIcon;
            
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateDisplay();
                } else {
                    // Time is up
                    clearInterval(timerInterval);
                    isRunning = false;
                    playAlarm();
                    resetTimer();
                }
            }, 1000);
        }
    }

    function resetTimer() {
        clearInterval(timerInterval);
        isRunning = false;
        timeLeft = STUDY_TIME;
        updateDisplay();
        document.getElementById('timer-icon').innerHTML = playIcon;
    }

    // Initialize display on load
    document.addEventListener('DOMContentLoaded', updateDisplay);
    </script>
</body>
</html>
