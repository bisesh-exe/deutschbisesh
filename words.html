<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bchronicles Deutsch - Wörter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col font-sans">

    <nav class="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="index.html" class="flex items-center gap-2 text-xl font-bold tracking-tight text-slate-800 hover:text-blue-600 transition-colors">
                    <span class="text-2xl">🇩🇪</span> 
                    <span>Bchronicles Deutsch</span>
                </a>
                
                <div class="hidden md:block">
                    <div class="flex space-x-2">
                        <a href="index.html" class="px-4 py-2 rounded-md text-sm font-medium transition-all duration-200 text-slate-600 hover:bg-slate-100">Sätze</a>
                        <a href="conversation.html" class="px-4 py-2 rounded-md text-sm font-medium transition-all duration-200 text-slate-600 hover:bg-slate-100">Gespräche</a>
                        <a href="words.html" class="px-4 py-2 rounded-md text-sm font-medium transition-all duration-200 text-blue-700 bg-blue-50">Wörter</a>
                    </div>
                </div>

                <div class="md:hidden flex items-center">
                    <button onclick="toggleMobileMenu()" class="text-slate-500 hover:text-blue-600 focus:outline-none p-2 rounded-md hover:bg-slate-100 transition-colors">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-slate-100 shadow-lg absolute w-full left-0">
            <div class="px-4 pt-2 pb-4 space-y-1">
                <a href="index.html" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-slate-600 hover:bg-slate-50">Sätze</a>
                <a href="conversation.html" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-slate-600 hover:bg-slate-50">Gespräche</a>
                <a href="words.html" class="block w-full text-left px-3 py-2 rounded-md text-base font-medium text-blue-700 bg-blue-50">Wörter</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-5xl mx-auto px-4 py-8 sm:py-12">
        
        <div class="text-center mb-10 space-y-4">
            <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-slate-900">
                Wortschatz (Words)
            </h1>
            <p class="text-slate-500 text-lg">Wählen Sie eine Kategorie, um neue Vokabeln zu lernen.</p>
            
            <div class="relative w-full sm:w-1/2 mx-auto mt-6">
                <select id="category-selector" onchange="updateWords(this.value)" class="w-full appearance-none bg-white border border-slate-300 text-slate-700 text-base rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 py-3 pl-4 pr-10 shadow-sm cursor-pointer transition-shadow hover:shadow-md">
                    <option value="b1_verben">B1 Verben</option>
                    </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6" id="words-container">
            </div>

    </main>

    <footer class="mt-auto border-t border-slate-200 bg-white">
        <div class="max-w-5xl mx-auto px-4 py-8 flex flex-col sm:flex-row items-center justify-between gap-4 text-center sm:text-left">
            <div>
                <p class="text-sm font-semibold text-slate-700">Bchronicles Deutsch</p>
                <p class="text-xs text-slate-500 mt-1">Lernportal für die deutsche Sprache</p>
            </div>
            <div class="text-sm text-slate-400">
                &copy; 2026. Alle Rechte vorbehalten.
            </div>
        </div>
    </footer>

    <script>
        // Vokabel-Datenbank
        const wordCategories = {
            "b1_verben": [
                { de: "beginnen", en: "to begin" },
                { de: "enden", en: "to end" },
                { de: "entscheiden", en: "to decide" },
                { de: "erklären", en: "to explain" },
                { de: "erzählen", en: "to tell / narrate" },
                { de: "versuchen", en: "to try / attempt" },
                { de: "vergessen", en: "to forget" },
                { de: "erinnern", en: "to remember" },
                { de: "beschreiben", en: "to describe" },
                { de: "vergleichen", en: "to compare" },
                { de: "verbessern", en: "to improve" },
                { de: "verändern", en: "to change" },
                { de: "entwickeln", en: "to develop" },
                { de: "erreichen", en: "to reach / achieve" },
                { de: "verlieren", en: "to lose" },
                { de: "gewinnen", en: "to win" },
                { de: "anbieten", en: "to offer" },
                { de: "ablehnen", en: "to refuse" },
                { de: "zustimmen", en: "to agree" },
                { de: "zweifeln", en: "to doubt" },
                { de: "erlauben", en: "to allow" },
                { de: "verbieten", en: "to forbid" },
                { de: "vermeiden", en: "to avoid" },
                { de: "planen", en: "to plan" },
                { de: "organisieren", en: "to organize" },
                { de: "teilnehmen", en: "to participate" },
                { de: "diskutieren", en: "to discuss" },
                { de: "erwarten", en: "to expect" },
                { de: "hoffen", en: "to hope" },
                { de: "fürchten", en: "to fear" },
                { de: "sich kümmern (um)", en: "to take care of" },
                { de: "sich interessieren (für)", en: "to be interested in" },
                { de: "sich erinnern (an)", en: "to remember" },
                { de: "sich vorbereiten (auf)", en: "to prepare for" },
                { de: "sich entscheiden (für)", en: "to decide on" },
                { de: "sich treffen", en: "to meet" },
                { de: "sich fühlen", en: "to feel" },
                { de: "sich verhalten", en: "to behave" },
                { de: "sich beschweren", en: "to complain" },
                { de: "sich entschuldigen", en: "to apologize" }
            ]
        };

        // Text-to-Speech Funktion
        function speakGerman(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                
                // Entfernt Klammern, damit der Browser "sich kümmern um" vorliest statt "sich kümmern Klammer auf um Klammer zu"
                const cleanText = text.replace(/[()]/g, '');
                
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = 'de-DE';
                utterance.rate = 0.85; 
                window.speechSynthesis.speak(utterance);
            }
        }

        // Mobile Menü umschalten
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        // Wörter rendern
        function updateWords(category) {
            const container = document.getElementById('words-container');
            const words = wordCategories[category];
            container.innerHTML = '';

            words.forEach((word) => {
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-200 rounded-xl p-4 shadow-sm hover:shadow-md transition-shadow flex flex-col h-full";
                
                card.innerHTML = `
                    <div class="flex-grow text-center flex flex-col justify-center py-2">
                        <p class="text-lg sm:text-xl font-bold text-slate-800 leading-tight">${word.de}</p>
                        <p class="text-sm text-slate-500 mt-2 italic">${word.en}</p>
                    </div>
                    <button class="mt-3 flex items-center justify-center gap-2 w-full py-2 px-3 rounded-lg bg-slate-50 border border-slate-200 text-blue-600 text-sm font-medium hover:bg-blue-50 hover:border-blue-200 transition-all duration-200">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd"></path></svg>
                        Hören
                    </button>
                `;

                // Event-Listener sicher hinzufügen
                card.querySelector('button').addEventListener('click', () => speakGerman(word.de));
                container.appendChild(card);
            });
        }

        // Beim Laden der Seite die Vokabeln anzeigen
        document.addEventListener('DOMContentLoaded', () => {
            updateWords('b1_verben');
        });
    </script>
</body>
</html>
