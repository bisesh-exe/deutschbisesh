    <main class="flex-grow w-full max-w-5xl mx-auto px-4 py-8 sm:py-12 flex flex-col">
        
        <div id="section-conversations" class="block transition-opacity duration-300 w-full">
            
            <div class="max-w-2xl mx-auto mb-8 text-center space-y-4">
                <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-slate-900">
                    Gespräche (Conversations)
                </h1>
                <p class="text-slate-500 text-lg">Wählen Sie ein Gespräch aus der Liste, um zu üben.</p>
                
                <div class="relative w-full sm:w-3/4 mx-auto mt-4">
                    <select id="conversation-selector" onchange="loadConversation(this.value)" class="w-full appearance-none bg-white border border-slate-300 text-slate-700 text-base sm:text-lg rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 py-3 pl-4 pr-10 shadow-sm cursor-pointer transition-shadow hover:shadow-md">
                        <option value="gespräch1">Gespräch 1: Fahrkartenkauf am Bahnhof</option>
                        <option value="gespräch2">Gespräch 2: Im Supermarkt</option>
                        <option value="gespräch3">Gespräch 3: Vom Flughafen nach Lübeck (Talk with Taxi driver)</option>
                        <option value="gespräch4">Gespräch 4: Wohnungsbesichtigung (Talk with Landlord)</option>


                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>
            
            <div class="w-full mx-auto relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-cyan-500 rounded-xl blur opacity-20 group-hover:opacity-30 transition duration-1000"></div>
                
                <div class="relative bg-slate-900 border border-slate-700 rounded-xl overflow-hidden shadow-2xl flex flex-col">
                    
                    <div class="bg-slate-900/90 backdrop-blur-md border-b border-slate-800 p-4 sm:p-5 flex items-center justify-between z-10 shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-2.5 h-2.5 rounded-full bg-cyan-400 animate-pulse shadow-[0_0_8px_rgba(34,211,238,0.8)]"></div>
                            <h4 id="conversation-title" class="text-lg font-medium tracking-wide text-slate-100">Lädt...</h4>
                        </div>
                        <span class="text-[0.65rem] font-mono tracking-widest text-cyan-400 bg-cyan-950/40 border border-cyan-800/50 rounded px-2.5 py-1 uppercase">A2 Level</span>
                    </div>

                    <div id="conversation-container" class="relative p-4 sm:p-6 overflow-y-auto h-[60vh] scroll-smooth bg-slate-900 bg-[linear-gradient(to_right,#ffffff03_1px,transparent_1px),linear-gradient(to_bottom,#ffffff03_1px,transparent_1px)] bg-[size:24px_24px]">
                        </div>
                </div>
            </div>

    <footer class="mt-auto border-t border-slate-200 bg-white">
      <div class="max-w-5xl mx-auto px-4 py-8 flex flex-col sm:flex-row items-center justify-between gap-4 text-center sm:text-left">
        <div>
          <p class="text-sm font-semibold text-slate-700">Bchronicles Deutsch</p>
          <p class="text-xs text-slate-500 mt-1">Lernportal für die deutsche Sprache (A2)</p>
        </div>
        <div class="text-sm text-slate-400">&copy; 2026. Alle Rechte vorbehalten.</div>
      </div>
    </footer>

    <script src="timer.js"></script>
    <script>
        // Global variables
        let allConversations = {};
        let availableVoices = [];

        // Load voices asynchronously
        function loadVoices() {
            availableVoices = window.speechSynthesis.getVoices();
        }
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }

        // Text-to-Speech
        function speakGerman(text, isSecondSpeaker) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'de-DE';
                utterance.rate = 0.85; 
                utterance.pitch = 1.0; 

                if (availableVoices.length === 0) {
                    availableVoices = window.speechSynthesis.getVoices();
                }

                const germanVoices = availableVoices.filter(voice => voice.lang.includes('de'));

                if (germanVoices.length > 0) {
                    if (isSecondSpeaker) {
                        const maleVoice = germanVoices.find(v => 
                            v.name.toLowerCase().includes('male') || 
                            v.name.toLowerCase().includes('stefan') ||  
                            v.name.toLowerCase().includes('conrad') ||  
                            v.name.toLowerCase().includes('killian') || 
                            v.name.toLowerCase().includes('yannick') || 
                            v.name.toLowerCase().includes('markus') ||  
                            v.name.toLowerCase().includes('jonas')      
                        );

                        if (maleVoice) {
                            utterance.voice = maleVoice;
                        } else {
                            utterance.voice = germanVoices[0];
                            utterance.pitch = 0.4; 
                        }
                    } else {
                        utterance.voice = germanVoices[0];
                        utterance.pitch = 1.1; 
                    }
                }
                window.speechSynthesis.speak(utterance);
            }
        }

        // Render Conversation with Futuristic UI
        function loadConversation(convId) {
            const conversation = allConversations[convId];
            if (!conversation) return;

            document.getElementById('conversation-title').textContent = conversation.title;
            const convContainer = document.getElementById('conversation-container');
            convContainer.innerHTML = ''; 

            const firstSpeaker = conversation.dialogue[0].speaker;

            conversation.dialogue.forEach((msg) => {
                const isRightSide = msg.speaker !== firstSpeaker;
                const alignOuter = isRightSide ? 'justify-end' : 'justify-start';
                const alignInner = isRightSide ? 'items-end' : 'items-start';
                
                // FUTURISTIC BUBBLE STYLING
                const bubbleColor = isRightSide 
                    ? 'bg-cyan-950/60 backdrop-blur-md border border-cyan-800/40 border-r-2 border-r-cyan-400 text-cyan-50 rounded-2xl rounded-tr-sm shadow-[0_0_15px_rgba(34,211,238,0.05)]' 
                    : 'bg-slate-800/80 backdrop-blur-md border border-slate-700/50 border-l-2 border-l-slate-400 text-slate-200 rounded-2xl rounded-tl-sm shadow-md';
                
                const speakerBtnColor = isRightSide
                    ? 'text-cyan-500 hover:text-cyan-300 hover:scale-110 drop-shadow-[0_0_5px_rgba(34,211,238,0.3)]'
                    : 'text-slate-400 hover:text-slate-200 hover:scale-110';

                const row = document.createElement('div');
                // Reduced bottom margin from mb-5 to mb-3 to keep conversations closer
                row.className = `flex w-full mb-3 ${alignOuter}`; 
                
                row.innerHTML = `
                    <div class="flex flex-col ${alignInner} max-w-[90%] sm:max-w-[75%]">
                        <span class="text-[0.65rem] font-mono tracking-widest text-slate-500 mb-1 px-1 uppercase">${msg.speaker}</span>
                        <div class="p-3.5 sm:p-4 ${bubbleColor} transition-all duration-300 hover:shadow-lg">
                            <div class="flex items-start gap-3">
                                <span class="text-base leading-relaxed msg-text font-light tracking-wide"></span>
                                <button class="msg-speak-btn flex-shrink-0 mt-0.5 ${speakerBtnColor} transition-all duration-200 focus:outline-none" title="Anhören">
                                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd"></path></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                
                row.querySelector('.msg-text').textContent = msg.text;
                row.querySelector('.msg-speak-btn').addEventListener('click', () => {
                    speakGerman(msg.text, isRightSide);
                });

                convContainer.appendChild(row);
            });
        }

        // Mobile Menu Toggle Logic
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        // Initialize App and Fetch Data
        document.addEventListener('DOMContentLoaded', () => {
            loadVoices();

            fetch('conversations.json')
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.json();
                })
                .then(data => {
                    allConversations = data;
                    const selector = document.getElementById('conversation-selector');
                    loadConversation(selector.value);
                })
                .catch(error => {
                    console.error('Error loading conversations:', error);
                    document.getElementById('conversation-container').innerHTML = 
                        '<p class="text-red-500 w-full text-center">Fehler beim Laden der Gespräche. Stellen Sie sicher, dass Sie einen lokalen Server verwenden.</p>';
                });
        });
    </script>
